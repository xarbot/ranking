<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ranking de Atletismo</title>
    <link rel="stylesheet" href="styles.css">
    <script src="i18n.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="topbar">
      <label class="language-picker">
        <span>Idioma</span>
        <select id="language" aria-label="Idioma">
          <option value="es">Castellano</option>
          <option value="ca">Català</option>
        </select>
      </label>
      <a class="admin-link" href="/admin/">Administracion</a>
    </div>
    <header class="hero">
      <div>
        <p class="eyebrow">Consulta publica</p>
        <h1>Ranking de Atletismo</h1>
        <p class="subtitle">Consulta las marcas registradas por prueba, categoria y atleta.</p>
      </div>
      <div class="stats" aria-label="Resumen">
        <div><strong id="count-athletes">0</strong><span>Atletas</span></div>
        <div><strong id="count-events">0</strong><span>Pruebas</span></div>
        <div><strong id="count-marks">0</strong><span>Marcas</span></div>
      </div>
    </header>
    <main>
      <section class="card filters" aria-label="Filtros">
        <div class="card-title">
          <div>
            <p class="eyebrow">Resultados</p>
            <h2>Marcas registradas</h2>
          </div>
          <button class="secondary" id="clear-filters" type="button">Limpiar filtros</button>
        </div>
        <div class="filter-grid">
          <label>Prueba
            <select id="event-filter"><option value="">Todas las pruebas</option></select>
          </label>
          <label>Categoria
            <select id="category-filter"><option value="">Todas las categorias</option></select>
          </label>
          <label>Atleta
            <input id="athlete-filter" placeholder="Nombre o apellidos...">
          </label>
        </div>
      </section>
      <p id="public-error" class="status failure hidden" role="alert"></p>
      <section class="card results">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Atleta</th>
                <th>Prueba</th>
                <th>Categoria</th>
                <th>Marca</th>
                <th>Fecha</th>
                <th>Sitio</th>
              </tr>
            </thead>
            <tbody id="marks-body"></tbody>
          </table>
          <p id="marks-empty" class="empty">No hay marcas registradas.</p>
        </div>
      </section>
    </main>
    <footer>Consulta publica de marcas deportivas.</footer>
  </body>
</html>
